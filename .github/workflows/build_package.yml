name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: 386
            artifact: web2api-linux-386
            binary: web2api
          - goos: linux
            goarch: amd64
            artifact: web2api-linux-amd64
            binary: web2api
          - goos: linux
            goarch: arm64
            artifact: web2api-linux-arm64
            binary: web2api
          - goos: linux
            goarch: arm
            artifact: web2api-linux-arm
            binary: web2api
          - goos: windows
            goarch: 386
            artifact: web2api-windows-386
            binary: web2api.exe
          - goos: windows
            goarch: amd64
            artifact: web2api-windows-amd64
            binary: web2api.exe
          - goos: windows
            goarch: arm64
            artifact: web2api-windows-arm64
            binary: web2api.exe
          - goos: windows
            goarch: arm
            artifact: web2api-windows-arm
            binary: web2api.exe
          - goos: darwin
            goarch: amd64
            artifact: web2api-darwin-amd64
            binary: web2api
          - goos: darwin
            goarch: arm64
            artifact: web2api-darwin-arm64
            binary: web2api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Build ${{ matrix.artifact }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.binary }}" ./cmd/web2api

      - name: Package ${{ matrix.artifact }}
        run: |
          rm -rf package
          mkdir -p package/web2api
          cp "dist/${{ matrix.binary }}" package/web2api/
          cp -r plugins package/web2api/
          cp -r web package/web2api/
          cd package
          zip -r "../dist/${{ matrix.artifact }}.zip" web2api

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}.zip

      - name: Cleanup old releases and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: false
        run: |
          set -e

          KEEP=5
          REPO="${{ github.repository }}"

          echo "Fetching releases..."

          releases=$(gh release list -R "$REPO" \
            --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].tagName')

          keep_tags=$(echo "$releases" | head -n $KEEP)

          echo "Tags to keep:"
          echo "$keep_tags"

          echo "Processing releases..."

          count=0
          for tag in $releases; do
            count=$((count+1))

            if [ $count -le $KEEP ]; then
              continue
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would delete release + tag: $tag"
            else
              echo "Deleting release: $tag"
              gh release delete "$tag" -R "$REPO" -y || true
              git push origin ":refs/tags/$tag" || true
            fi
          done

          echo "Cleaning orphan tags..."

          all_tags=$(git ls-remote --tags origin | grep -v '\^{}' | awk '{print $2}' | sed 's|refs/tags/||')

          for tag in $all_tags; do
            if ! echo "$keep_tags" | grep -qx "$tag"; then
              if [ "$DRY_RUN" = "true" ]; then
                echo "[DRY RUN] Would delete orphan tag: $tag"
              else
                echo "Deleting orphan tag: $tag"
                git push origin ":refs/tags/$tag" || true
              fi
            fi
          done
